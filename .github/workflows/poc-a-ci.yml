# APP REPO CI - poc-a-java
# Calls the central reusable workflow.
# config-file is optional: if not provided, only central defaults are used.

name: CI - PoC A

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  ci:
    name: CI
    uses: NTTData-HybridCloud/poc-central-pipelines/.github/workflows/poc-a-java-ci.yml@main
    with:
      project-name: poc-a-java-app
      config-file: config/poc-a-pipeline-config.yml
    secrets: inherit
